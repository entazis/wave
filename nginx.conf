# Rate limiting zone
limit_req_zone $binary_remote_addr zone=wave_limit:10m rate=50r/s;

server {
    listen 80;
    listen [::]:80;
    server_name wave.entazis.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name wave.entazis.dev;

    include snippets/ssl-entazis.conf;

    root /var/www/wave;
    index index.html;

    # Rate limiting
    limit_req_status 429;
    limit_req zone=wave_limit burst=120 nodelay;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy tracking requests to metrics-api
    location /api/track {
        proxy_pass http://127.0.0.1:8080/track;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
